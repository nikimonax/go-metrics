<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Metrics</title>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        body {
            font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, Oxygen, Ubuntu, sans-serif;
            background-color: #1a1a2e;
            color: #eaeaea;
            min-height: 100vh;
            padding: 40px 20px;
        }

        h1 {
            text-align: center;
            margin-bottom: 30px;
            color: #00d9ff;
            font-size: 2.5em;
            font-weight: 600;
            text-shadow: 0 0 20px rgba(0, 217, 255, 0.3);
        }

        .container {
            max-width: 900px;
            margin: 0 auto;
        }

        table {
            width: 100%;
            border-collapse: collapse;
            background: #16213e;
            border-radius: 12px;
            overflow: hidden;
            box-shadow: 0 10px 40px rgba(0, 0, 0, 0.5);
        }

        thead {
            background: linear-gradient(135deg, #0f3460 0%, #16213e 100%);
        }

        th {
            padding: 18px 24px;
            text-align: left;
            font-weight: 600;
            color: #00d9ff;
            text-transform: uppercase;
            font-size: 0.85em;
            letter-spacing: 1px;
            border-bottom: 2px solid #0f3460;
        }

        td {
            padding: 16px 24px;
            border-bottom: 1px solid #1f2b47;
            transition: background-color 0.2s ease;
        }

        tr:hover td {
            background-color: #1f2b47;
        }

        tr:last-child td {
            border-bottom: none;
        }

        td:first-child {
            color: #ff6b6b;
            font-weight: 500;
        }

        td:last-child {
            font-family: 'Monaco', 'Menlo', 'Ubuntu Mono', monospace;
            color: #4ade80;
        }

        .empty {
            text-align: center;
            padding: 40px;
            color: #6b7280;
            font-style: italic;
        }
    </style>
</head>
<body>
    <div class="container">
        <h1>Metrics</h1>
        {{if .}}
        <table>
            <thead>
                <tr>
                    <th>Type</th>
                    <th>Name</th>
                    <th>Value</th>
                </tr>
            </thead>
            <tbody>
                {{range .}}
                <tr>
                    <td>{{.Type}}</td>
                    <td>{{.Name}}</td>
                    <td>{{.Value}}</td>
                </tr>
                {{end}}
            </tbody>
        </table>
        {{else}}
        <div class="empty">No metrics available</div>
        {{end}}
    </div>
</body>
</html>
